syntax = "proto3";

package ring;

// ═══════════════════════════════════════════════════════════
// Ring gRPC Service Definition
//
// Shared contract between iOS client and Node.js backend.
// All existing REST endpoints have a unary RPC equivalent.
// StreamDomains is a server-streaming RPC for future real-time use.
// ═══════════════════════════════════════════════════════════

service RingService {
  // Consent — equivalent to POST /api/consent
  rpc SendConsent (ConsentRequest) returns (ConsentResponse);

  // Telemetry — equivalent to POST /api/telemetry
  rpc SendTelemetry (TelemetryRequest) returns (TelemetryResponse);

  // Config — equivalent to GET /api/config/associations
  rpc GetAssociations (AssociationsRequest) returns (AssociationsResponse);

  // Insights — equivalent to GET /api/config/insights?device_id=
  rpc GetInsights (InsightsRequest) returns (InsightsResponse);

  // Health — equivalent to GET /health
  rpc HealthCheck (HealthRequest) returns (HealthResponse);

  // Real-time domain streaming (future use)
  // Client subscribes, server pushes domain events as they arrive
  rpc StreamDomains (StreamDomainsRequest) returns (stream DomainEvent);
}

// ═══════════════════════════════════════════════════════════
// Consent
// ═══════════════════════════════════════════════════════════

message ConsentRequest {
  string device_id = 1;
  ConsentChoices consents = 2;
  string app_version = 3;
  string os_version = 4;
}

message ConsentChoices {
  bool dns_telemetry = 1;
  bool usage_analytics = 2;
  bool crash_reports = 3;
}

message ConsentResponse {
  bool success = 1;
}

// ═══════════════════════════════════════════════════════════
// Telemetry
// ═══════════════════════════════════════════════════════════

message TelemetryRequest {
  string device_id = 1;
  string session_id = 2;
  int32 mapping_version = 3;
  int32 duration_sec = 4;
  repeated DomainEventEntry domain_events = 5;
  repeated UnmappedDomain unmapped_domains = 6;
  QueryVolume query_volume = 7;
}

message DomainEventEntry {
  string site_domain = 1;
  int32 layer = 2;
  int32 visit_count = 3;
  int32 domain_count = 4;
}

message UnmappedDomain {
  string domain = 1;
  string site_domain = 2;
  int32 visit_count = 3;
}

message QueryVolume {
  int32 total = 1;
  int32 noise_filtered = 2;
  int32 unique_sites = 3;
  int32 unique_domains = 4;
}

message TelemetryResponse {
  bool accepted = 1;
  string error = 2;
}

// ═══════════════════════════════════════════════════════════
// Associations Config
// ═══════════════════════════════════════════════════════════

message AssociationsRequest {
  string etag = 1; // client sends cached etag, server returns not_modified if match
}

message AssociationsResponse {
  int32 version = 1;
  map<string, string> associations = 2;   // cdn_domain -> parent_site
  repeated string infra_domains = 3;
  repeated string multi_part_tlds = 4;
  bool not_modified = 5;                  // true if etag matched
}

// ═══════════════════════════════════════════════════════════
// Insights
// ═══════════════════════════════════════════════════════════

message InsightsRequest {
  string device_id = 1;
}

message InsightsResponse {
  string device_id = 1;
  int32 total_visits = 2;
  int32 category_count = 3;
  repeated InsightsCategory insights = 4;
}

message InsightsCategory {
  string category = 1;
  string label = 2;
  int32 site_count = 3;
  int32 total_visits = 4;
  int32 total_domains = 5;
  int32 percentage = 6;
  repeated InsightsSite sites = 7;
}

message InsightsSite {
  string domain = 1;
  int32 visits = 2;
  int32 domains = 3;
}

// ═══════════════════════════════════════════════════════════
// Health
// ═══════════════════════════════════════════════════════════

message HealthRequest {}

message HealthResponse {
  string status = 1;   // "ok" or "degraded"
  string db = 2;        // "connected" or "disconnected"
  string timestamp = 3;
}

// ═══════════════════════════════════════════════════════════
// Domain Streaming (future real-time use)
// ═══════════════════════════════════════════════════════════

message StreamDomainsRequest {
  string device_id = 1;
}

message DomainEvent {
  string domain = 1;
  string site_domain = 2;
  string category = 3;
  string category_label = 4;
  int64 timestamp_ms = 5;
  string source = 6;     // "dns" or "sni"
}
